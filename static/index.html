<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Auth Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .box {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .box:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }

        .box h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .box h4 {
            color: #555;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        input[type="text"],
        input[type="password"],
        input[type="file"] {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 14px 24px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        button.secondary:hover {
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }

        button.logout {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            box-shadow: 0 4px 15px rgba(250, 112, 154, 0.4);
        }

        button.logout:hover {
            box-shadow: 0 6px 20px rgba(250, 112, 154, 0.6);
        }

        #response-area {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            border: 2px solid #e0e0e0;
            max-height: 400px;
            overflow-y: auto;
            color: #2d3748;
        }

        .hidden {
            display: none;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-radius: 12px;
            margin-bottom: 24px;
        }

        #avatar-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .profile-info h3 {
            color: #2d3748;
            margin-bottom: 8px;
            font-size: 1.4em;
        }

        .token-badge {
            display: inline-block;
            background: #48bb78;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .upload-section {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 2px dashed #cbd5e0;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        hr {
            border: none;
            border-top: 2px solid #e0e0e0;
            margin: 24px 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .box {
            animation: fadeIn 0.5s ease-out;
        }

        .emoji {
            font-size: 1.2em;
        }

        /* Scrollbar styling */
        #response-area::-webkit-scrollbar {
            width: 8px;
        }

        #response-area::-webkit-scrollbar-track {
            background: #e0e0e0;
            border-radius: 10px;
        }

        #response-area::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            .box {
                padding: 20px;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .button-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="emoji">🔐</span> FastAPI Auth Client</h1>

        <div id="login-section" class="box">
            <h3><span class="emoji">🚪</span> Вход в систему</h3>
            <input type="text" id="username" placeholder="Введите username">
            <input type="password" id="password" placeholder="Введите пароль">
            <button onclick="login()">Войти</button>
        </div>

        <div id="dashboard-section" class="box hidden">
            <div class="profile-header">
                <img id="avatar-image" src="https://via.placeholder.com/100?text=Avatar" alt="Avatar">
                <div class="profile-info">
                    <h3><span class="emoji">👋</span> Привет, <span id="display-username">пользователь</span>!</h3>
                    <span class="token-badge">✓ Авторизован</span>
                </div>
            </div>

            <div class="upload-section">
                <h4><span class="emoji">📸</span> Обновить аватарку</h4>
                <input type="file" id="avatar-input" accept="image/*">
                <button onclick="uploadAvatar()" class="secondary">Загрузить фото</button>
            </div>
            
            <hr>
            
            <h4><span class="emoji">🔒</span> Защищенные эндпоинты</h4>
            <div class="button-group">
                <button onclick="getMe()">Мой профиль</button>
                <button onclick="getProducts()" class="secondary">Товары</button>
            </div>

            <hr>
            
            <button onclick="logout()" class="logout" style="width: 100%;">Выйти из системы</button>
        </div>

        <div class="box">
            <h3><span class="emoji">📡</span> Ответ сервера</h3>
            <pre id="response-area">Здесь будет отображаться ответ от API...</pre>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
